<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FixNation | Map View</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Specific overrides for immersive map view */
        .dashboard-scroll-area.no-padding {
            padding: 0;
            display: flex;
        }
        .full-map-wrap {
            flex: 1;
            position: relative;
            background-color: #0f172a;
            overflow: hidden;
        }
        .map-bg-full {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.2;
            background-image: 
                linear-gradient(rgba(255,255,255,0.2) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.2) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .map-hud {
            position: absolute;
            top: 2rem;
            left: 2rem;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            color: white;
            width: 300px;
            box-shadow: var(--shadow-xl);
            z-index: 10;
        }
        .map-hud h2 {
            font-size: 1.125rem;
            margin-bottom: 1rem;
            color: var(--color-orange);
        }
        .hud-stat {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.75rem;
            font-size: 0.875rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 0.5rem;
        }
        .hud-stat:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        .map-zoom-controls {
            position: absolute;
            bottom: 2rem;
            right: 2rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            z-index: 10;
        }
        .map-btn {
            background: var(--color-white);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: var(--shadow-md);
            color: var(--color-navy);
            transition: all 0.2s;
        }
        .map-btn:hover {
            background: var(--color-gray-100);
            color: var(--color-orange);
        }
    </style>
</head>
<body class="dashboard-body">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-brand">
            <svg class="brand-logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path>
            </svg>
            <div class="brand-titles">
                <span class="brand-text">FixNation</span>
                <span class="brand-sub">Govt Admin Portal</span>
            </div>
        </div>
        
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"></rect><rect x="14" y="3" width="7" height="5"></rect><rect x="14" y="12" width="7" height="9"></rect><rect x="3" y="16" width="7" height="5"></rect></svg>
                Dashboard
            </a>
            <a href="map-view.html" class="nav-item active">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"></polygon><line x1="8" y1="2" x2="8" y2="18"></line><line x1="16" y1="6" x2="16" y2="22"></line></svg>
                Map View
            </a>
            <a href="asset-health.html" class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"></path></svg>
                Asset Health
            </a>
            <a href="verifications.html" class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16c0 1.1.9 2 2 2h12a2 2 0 0 0 2-2V8l-6-6z"></path><path d="M14 3v5h5M16 13H8M16 17H8M10 9H8"></path></svg>
                Verification Requests <span class="nav-badge">5</span>
            </a>
            <a href="workforce.html" class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                Workforce Tracking
            </a>
            <a href="financial.html" class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                Financial Reports
            </a>
            <a href="settings.html" class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                Settings
            </a>
        </nav>
    </aside>

    <!-- MAIN DASHBOARD AREA -->
    <div class="main-content">
        
        <!-- HEADER -->
        <header class="dash-header">
            <div class="search-bar">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" placeholder="Quick Search Coordinates or IDs...">
            </div>
            <div class="header-tools">
                <div class="dash-bell">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
                    <span class="bell-dot"></span>
                </div>
                <div class="admin-profile">
                    <div class="profile-icon">A</div>
                    <span class="profile-name">Govt Admin</span>
                </div>
            </div>
        </header>

        <div class="dashboard-scroll-area no-padding">
            <!-- FULL MAP VIEW -->
            <div class="full-map-wrap">
                <div class="map-bg-full"></div>
                
                <div class="map-hud">
                    <h2>Live Infrastructure</h2>
                    <div class="hud-stat">
                        <span>Monitoring Window</span>
                        <strong>Sector Alpha</strong>
                    </div>
                    <div class="hud-stat">
                        <span>Active Terminals</span>
                        <strong style="color:#10b981;">1,240 Online</strong>
                    </div>
                    <div class="hud-stat">
                        <span>Critical Faults</span>
                        <strong style="color:#ef4444;">03 Detected</strong>
                    </div>
                    <div class="hud-stat">
                        <span>Deployed Workforce</span>
                        <strong style="color:var(--color-orange);">45 Units</strong>
                    </div>
                </div>

                <!-- Scattered Pins for realism -->
                <div class="pin dot-green" style="top: 15%; left: 30%;"></div>
                <div class="pin dot-green" style="top: 25%; left: 45%;"></div>
                <div class="pin dot-green" style="top: 12%; left: 65%;"></div>
                <div class="pin dot-green" style="top: 40%; left: 35%;"></div>
                <div class="pin dot-green" style="top: 50%; left: 70%;"></div>
                <div class="pin dot-green" style="top: 60%; left: 40%;"></div>
                <div class="pin dot-green" style="top: 80%; left: 60%;"></div>
                <div class="pin dot-green" style="top: 55%; left: 20%;"></div>
                <div class="pin dot-green" style="top: 75%; left: 80%;"></div>
                <div class="pin dot-green" style="top: 85%; left: 35%;"></div>

                <div class="pin dot-red-pulse" style="top: 45%; left: 55%;"></div>
                <div class="pin dot-red-pulse" style="top: 20%; left: 80%;"></div>
                <div class="pin dot-red-pulse" style="top: 70%; left: 15%;"></div>

                <div class="pin pin-orange" style="top: 30%; left: 40%;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
                </div>
                <div class="pin pin-orange" style="top: 65%; left: 50%;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
                </div>

                <div class="map-zoom-controls">
                    <button class="map-btn"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg></button>
                    <button class="map-btn"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"></line></svg></button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
